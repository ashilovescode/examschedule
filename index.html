<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>igcse prep ˖๋ ✦</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap');
:root{--s0:#2a3f28;--s1:#3d5c3a;--s2:#526e4f;--s3:#6b8a67;--s4:#93aa90;--s5:#c2d4bf;--s6:#deeadc;--s7:#edf4eb;--bg:#f4f7f3;--card:#ffffff;--text:#2a3f28;--text2:#526e4f;--text3:#93aa90;--border:#c2d4bf;--border2:#deeadc;--m-dot:#5a7e52;--m-text:#2e5228;--m-bg:#eaf3e7;--m-border:#a8c9a0;--p-dot:#8a6e4e;--p-text:#5c3e24;--p-bg:#f5ece0;--p-border:#c9a888;--b-dot:#4e7a8a;--b-text:#24505c;--b-bg:#e0edf5;--b-border:#88b0c9;--e-dot:#7a5a8a;--e-text:#4e2e5c;--e-bg:#ede0f5;--e-border:#b088c9;--pp-dot:#8a7a4e;--pp-text:#5c4e24;--pp-bg:#f5f0e0;--pp-border:#c9be88;--r-dot:#6b8a67;--r-text:#3d5c3a;--r-bg:#edf4eb;--r-border:#c2d4bf;}
@media(prefers-color-scheme:dark){:root{--s0:#c8dcc5;--s1:#a8c4a4;--s2:#88aa83;--s3:#6b8a67;--s4:#4e6e4a;--s5:#324d2f;--s6:#223320;--s7:#182618;--bg:#111a10;--card:#1a2419;--text:#c8dcc5;--text2:#88aa83;--text3:#4e6e4a;--border:#324d2f;--border2:#223320;--m-dot:#7aaa70;--m-text:#a8d4a0;--m-bg:#1a2e18;--m-border:#3a5e34;--p-dot:#aa8860;--p-text:#d4b888;--p-bg:#2a1e10;--p-border:#5e4830;--b-dot:#608aaa;--b-text:#88b8d4;--b-bg:#101e2a;--b-border:#305068;--e-dot:#9a78aa;--e-text:#c4a0d4;--e-bg:#1e1028;--e-border:#503068;--pp-dot:#aa9860;--pp-text:#d4c888;--pp-bg:#281e10;--pp-border:#5e5030;--r-dot:#6b8a67;--r-text:#a8c4a4;--r-bg:#182618;--r-border:#324d2f;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem 1rem 3rem;}
.wrap{max-width:860px;margin:0 auto;}
.hdr{text-align:center;margin-bottom:1.5rem;padding:1.5rem 1.25rem;background:var(--card);border-radius:18px;border:1px solid var(--border);}
.hdr-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--s1);margin-bottom:4px;}
.hdr-sub{font-size:12px;color:var(--text2);margin-bottom:14px;}
.stats-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px;}
.stat-pill{background:var(--s7);border:1px solid var(--border);border-radius:99px;padding:4px 12px;font-size:11px;color:var(--text);}
.stat-pill b{font-weight:500;color:var(--s1);}
.prog-wrap{margin:0 auto 4px;max-width:360px;}
.prog-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:3px;}
.prog-outer{height:8px;background:var(--border2);border-radius:99px;overflow:hidden;}
.prog-inner{height:100%;background:var(--s2);border-radius:99px;transition:width .5s ease;}
.prog-label{font-size:11px;color:var(--text2);margin-top:4px;}
.streak-banner{display:none;background:var(--s7);border:1px solid var(--border);border-radius:12px;padding:8px 14px;margin-bottom:1rem;text-align:center;font-size:12px;color:var(--s1);}
.badges-row{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:1.25rem;}
.badge{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:7px 10px;text-align:center;min-width:68px;opacity:.4;filter:grayscale(1);transition:all .2s;}
.badge.earned{opacity:1;filter:none;background:var(--s7);border-color:var(--s3);}
.badge-icon{font-size:15px;display:block;margin-bottom:2px;}
.badge-name{font-size:10px;color:var(--text2);display:block;}
.legend{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:1.25rem;}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text);background:var(--card);padding:3px 9px;border-radius:99px;border:1px solid var(--border);}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
#panel-slot{margin-bottom:10px;}
.panel{border-radius:14px;border:1.5px solid;padding:1.25rem;animation:sI .2s ease;}
@keyframes sI{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.pan-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;gap:8px;}
.pan-title{font-size:14px;font-weight:500;}
.pan-close{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;}
.pan-close:hover{background:var(--border2);}
.pan-date{font-size:11px;color:var(--text3);margin-bottom:4px;}
.pan-note{font-size:11px;font-style:italic;color:var(--text2);margin-bottom:8px;padding:4px 8px;border-left:2px solid var(--border);}
.pan-topic{font-size:13px;margin-bottom:10px;line-height:1.5;}
.steps{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.step{background:var(--card);border-radius:8px;border:1px solid var(--border2);padding:7px 10px;}
.step-h{font-size:11px;font-weight:500;margin-bottom:2px;}
.step-b{font-size:11px;line-height:1.6;color:var(--text2);}
.pan-btns{display:flex;gap:7px;flex-wrap:wrap;}
.pbtn{font-size:11px;padding:5px 14px;border-radius:99px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;transition:background .15s;}
.pbtn:hover{background:var(--s7);}
.pbtn.active{background:var(--s6);border-color:var(--s3);color:var(--s1);}
.cal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(94px,1fr));gap:6px;}
.dc{border-radius:12px;border:1px solid var(--border2);padding:8px 9px;cursor:pointer;min-height:80px;background:var(--card);transition:border-color .15s,transform .1s;display:flex;flex-direction:column;gap:2px;}
.dc:hover{border-color:var(--s3);transform:translateY(-1px);}
.dc.done{opacity:.65;}
.dc.open{border-width:1.5px;}
.dnum{font-size:10px;color:var(--text2);display:flex;align-items:center;gap:3px;}
.tpip{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--s2);}
.ddate{font-size:10px;}
.dsubj{font-size:11px;font-weight:500;margin-top:1px;}
.dtopic{font-size:10px;line-height:1.35;flex:1;opacity:.75;}
.ddeco{font-size:9px;color:var(--text3);margin-top:2px;letter-spacing:.5px;}
.ppb{font-size:9px;padding:1px 5px;border-radius:4px;background:var(--pp-bg);color:var(--pp-text);border:1px solid var(--pp-border);display:inline-block;margin-top:2px;}
@media(max-width:480px){.cal-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:5px;}body{padding:1rem .75rem 3rem;}}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr">
  <div class="hdr-title">.𖥔 ݁ ˖๋ ࣭ ⭑ igcse prep ⭑ ࣭ ˖๋ ݁ 𖥔.</div>
  <div class="hdr-sub">mar 28 → apr 29 &nbsp;·&nbsp; 33 days &nbsp;·&nbsp; you've so got this ♡</div>
  <div class="stats-row">
    <div class="stat-pill">done <b id="st-done">0</b> / 33</div>
    <div class="stat-pill">streak <b id="st-streak">0</b> days ✦</div>
    <div class="stat-pill">days left <b id="st-left">33</b></div>
  </div>
  <div class="prog-wrap">
    <div class="prog-labels"><span>0%</span><span>100%</span></div>
    <div class="prog-outer"><div class="prog-inner" id="pbar" style="width:0%"></div></div>
    <div class="prog-label" id="plabel">0% — let's go ˚</div>
  </div>
</div>
<div class="streak-banner" id="streak-banner"></div>
<div class="badges-row" id="badges-row"></div>
<div class="legend">
  <div class="leg"><div class="ldot" style="background:#5a7e52"></div>maths</div>
  <div class="leg"><div class="ldot" style="background:#8a6e4e"></div>physics</div>
  <div class="leg"><div class="ldot" style="background:#4e7a8a"></div>biology</div>
  <div class="leg"><div class="ldot" style="background:#7a5a8a"></div>paper 6 / english</div>
  <div class="leg"><div class="ldot" style="background:#8a7a4e"></div>past paper day</div>
  <div class="leg"><div class="ldot" style="background:#6b8a67"></div>rest ˊˎ-</div>
</div>
<div id="panel-slot"></div>
<div id="cal-grid" class="cal-grid"></div>
</div>
<script>
var SS={"maths":{dot:"#5a7e52",text:"var(--m-text)",bg:"var(--m-bg)",border:"var(--m-border)"},"physics":{dot:"#8a6e4e",text:"var(--p-text)",bg:"var(--p-bg)",border:"var(--p-border)"},"biology":{dot:"#4e7a8a",text:"var(--b-text)",bg:"var(--b-bg)",border:"var(--b-border)"},"paper 6 / english":{dot:"#7a5a8a",text:"var(--e-text)",bg:"var(--e-bg)",border:"var(--e-border)"},"past paper day":{dot:"#8a7a4e",text:"var(--pp-text)",bg:"var(--pp-bg)",border:"var(--pp-border)"},"rest ˊˎ-":{dot:"#6b8a67",text:"var(--r-text)",bg:"var(--r-bg)",border:"var(--r-border)"}};
var DC=["˖๋ ࣭ ⭑","·˚ ༘","𖥔 ݁","˚ʚ♡ɞ˚","✦ ˚","⊹ ˚","✩ ˚","˖ ·˚","𓂃 ˖","☽ ˖","⋆ ˚","𖦹 ˚"];
var DAYS=[
{subj:"maths",topic:"number — types, hcf, lcm, primes & standard form",note:"diagnostic day — find out where you actually stand before diving in",steps:[{t:"0:00",h:"diagnostic first — 5 min",b:"try these cold: (1) find hcf of 36 and 48, (2) write 0.000372 in standard form, (3) is 91 prime? attempt them — wrong is fine, it tells you exactly where to focus today."},{t:"0:05",h:"watch & learn — 10 min",b:"search youtube: 'corbettmaths number types hcf lcm standard form'. corbettmaths does short punchy worked examples — watch only the topics you got wrong in the diagnostic."},{t:"0:15",h:"worked examples — 5 min",b:"go to corbettmaths.com → worked examples for whichever topic you got wrong. read through 2 fully solved examples, noting exactly what step follows what."},{t:"0:20",h:"mcq drill — 8 min",b:"savemyexams.com → igcse maths → number. do their multiple choice questions. mcqs force you to recognise the right answer in context — exactly how your memory works best."},{t:"0:28",h:"flag it — 2 min",b:"write the one thing the diagnostic showed was shaky. that's your priority next time you revisit number. done ✦"}]},
{subj:"physics",topic:"motion — speed, velocity, acceleration & distance-time graphs",note:"calculations are your strength — lean into that first to build confidence",steps:[{t:"0:00",h:"calculations first — 5 min",b:"try these before watching: (1) a car travels 120m in 4s, find speed. (2) velocity changes from 5 m/s to 20 m/s in 3s, find acceleration. use speed=distance/time and a=(v-u)/t."},{t:"0:05",h:"watch cognito — 10 min",b:"search youtube: 'cognito motion igcse physics'. watch specifically for how they describe distance-time vs speed-time graphs — high-mark exam content."},{t:"0:15",h:"exam phrase drill — 5 min",b:"write these exact phrases that get marks: 'constant velocity = horizontal line on distance-time graph', 'acceleration = gradient of speed-time graph', 'distance = area under speed-time graph'. cover and rewrite."},{t:"0:20",h:"past paper describe qs — 8 min",b:"physicsandmathstutor.com → physics → igcse → motion. find a 'describe the motion' question. answer using the phrases above. check mark scheme — did you use those exact words?"},{t:"0:28",h:"wrap up — 2 min",b:"write the one graph feature you'd most likely forget to mention. that's your motion flag. done ˖๋ ✦"}]},
{subj:"biology",topic:"characteristics & classification + cell structure & organisation",note:"you know how cells work — today is about nailing the exact keyword names",steps:[{t:"0:00",h:"what you already know — 2 min",b:"write every cell organelle you can name from memory. nucleus, mitochondria... how many can you get? this is your baseline."},{t:"0:02",h:"mcq cold start — 8 min",b:"savemyexams.com → igcse biology → cell structure. do the full mcq set before watching anything. this immediately shows which organelle names are slipping."},{t:"0:10",h:"watch cognito — 8 min",b:"search youtube: 'cognito cell structure igcse biology'. every time they name an organelle you didn't write, pause and add it to your list."},{t:"0:18",h:"mark scheme phrases — 6 min",b:"find a past paper cell structure question on physicsandmathstutor.com. read the mark scheme. underline every keyword that gets its own bullet point — those are the exact words the examiner wants."},{t:"0:24",h:"final keyword list — 4 min",b:"write: nucleus (controls cell), mitochondria (respiration/energy), ribosome (protein synthesis), cell membrane (controls entry/exit), cell wall (support, plants only), chloroplast (photosynthesis), vacuole (stores sap), cytoplasm (site of reactions). done ˚ʚ♡ɞ˚"}]},
{subj:"maths",topic:"number — fractions, decimals, percentages, ratio & proportion",note:"heavy on worked examples — see the method, then copy it exactly",steps:[{t:"0:00",h:"confidence check — 2 min",b:"rate each 1-3: fractions, decimals, percentages, ratio. this tells you where to spend most of today."},{t:"0:02",h:"worked examples — 12 min",b:"search youtube: 'corbettmaths percentage increase decrease' and 'corbettmaths ratio problems'. pause after each example and copy the method on paper before moving on. don't just watch."},{t:"0:14",h:"the conversion rule — 3 min",b:"write: fraction→decimal: divide top by bottom. decimal→percentage: multiply by 100. recurring decimal→fraction: multiply by 10 until decimals align, subtract. this is the manipulation that trips people up most."},{t:"0:17",h:"mcq drill — 8 min",b:"savemyexams.com → igcse maths → percentages & ratio. when you get one wrong, go back to the worked example for that type before moving on."},{t:"0:25",h:"one hard question — 3 min",b:"mathsgenie.co.uk → reverse percentage or ratio question. attempt fully, check mark scheme step by step. where did your method differ? that's the gap. done ✦"}]},
{subj:"physics",topic:"forces — newton's laws, friction, weight & pressure",note:"formulae are your comfort zone — start there, then tackle describe questions",steps:[{t:"0:00",h:"formula warm-up — 3 min",b:"write from memory: weight = mass × g (g=9.8), pressure = force ÷ area, F = ma. blank ones = your focus today."},{t:"0:03",h:"watch cognito — 10 min",b:"search youtube: 'cognito forces igcse physics' and 'cognito pressure igcse'. watch both. pay close attention to the pressure in liquids diagram."},{t:"0:13",h:"exam phrase drill — 5 min",b:"write these describe/explain phrases: 'friction is a contact force that opposes motion and causes heating', 'pressure increases with depth because there is more liquid above exerting weight', 'weight acts downward from centre of gravity'. cover and rewrite."},{t:"0:18",h:"calculation practice — 7 min",b:"physicsandmathstutor.com → forces & pressure. do 3 calculation questions. these should feel comfortable."},{t:"0:25",h:"one describe question — 3 min",b:"find an 'explain why pressure increases with depth' question. answer using the phrase from step 3. check mark scheme — did you include the word 'weight'? that's the keyword most people miss. done ˖๋"}]},
{subj:"biology",topic:"movement in & out of cells — diffusion, osmosis & active transport",note:"you probably know how these work — today is entirely about nailing the exact definitions",steps:[{t:"0:00",h:"definition attempt — 3 min",b:"without looking, write a one-sentence definition of: diffusion, osmosis, active transport. write what you think — this is your before snapshot."},{t:"0:03",h:"mcq first — 8 min",b:"savemyexams.com → igcse biology → movement in and out of cells. do the mcq set before watching anything. mcqs in context help you recognise correct wording — your strongest learning method."},{t:"0:11",h:"watch cognito — 8 min",b:"search youtube: 'cognito diffusion osmosis active transport igcse'. check where your definitions were close and where they missed keywords."},{t:"0:19",h:"keyword fix — 5 min",b:"rewrite your 3 definitions with correct exam wording. required: diffusion → 'net movement', 'concentration gradient'. osmosis → 'partially permeable membrane', 'water potential'. active transport → 'against concentration gradient', 'energy from respiration', 'protein carriers'."},{t:"0:24",h:"mark scheme check — 4 min",b:"find one past paper osmosis/diffusion question. write your answer, check mark scheme, circle every keyword you used correctly and every one you missed. done ˚"}]},
{subj:"maths",topic:"algebra — expressions, equations, inequalities & sequences",note:"this is where the rules and manipulation stuff lives — visual step-by-step is essential today",steps:[{t:"0:00",h:"the rules visually — 5 min",b:"search youtube: 'corbettmaths algebraic manipulation'. watch the first 3 minutes — he writes rules with arrows showing why they work. pause every time a new rule appears."},{t:"0:05",h:"copy the method — 8 min",b:"work through 2 of corbettmaths' examples yourself — cover the working, attempt it, then uncover and compare step by step. where your method diverges = the rule you're misapplying."},{t:"0:13",h:"three rules to know — 4 min",b:"write these with the reason: (1) expanding brackets → use 2x2 grid method if foil loses you. (2) collecting like terms → only combine same letter AND same power. (3) inequalities → flip sign when multiplying/dividing by a negative."},{t:"0:17",h:"mcq drill — 8 min",b:"savemyexams.com → igcse maths → algebra → expressions and sequences. every wrong answer = find which rule you broke and write it down before moving on."},{t:"0:25",h:"one harder question — 3 min",b:"mathsgenie.co.uk → sequences or inequalities. show every line of working. method marks are yours even if the final answer is wrong. done ✦"}]},
{subj:"rest ˊˎ-",topic:"rest or catch-up day ˚",note:"buffer",steps:null},
{subj:"biology",topic:"biological molecules — carbohydrates, proteins, fats & enzymes",note:"lots of keywords — mcqs are going to do most of the heavy lifting today",steps:[{t:"0:00",h:"mcq cold start — 8 min",b:"savemyexams.com → igcse biology → biological molecules + enzymes. do both mcq sets before watching anything. this shows exactly which molecule names and enzyme keywords are slipping."},{t:"0:08",h:"watch cognito — 10 min",b:"search youtube: 'cognito enzymes igcse biology'. watch specifically for: lock and key model, active site, denaturation, optimum temperature/ph. these come up every year."},{t:"0:18",h:"enzyme keywords in context — 6 min",b:"find a past paper enzyme question on physicsandmathstutor.com. read the mark scheme. underline: 'active site', 'enzyme-substrate complex', 'denatured', 'optimum'. seeing them in sentences = your strongest memorisation route."},{t:"0:24",h:"molecule cheat sheet — 4 min",b:"write these four lines: carbohydrates → energy source, made of glucose. proteins → amino acids, enzymes + structure. lipids → fats + glycerol, energy store. water → transport medium, reactant. that's the whole molecules topic in exam terms. done ˚ʚ♡ɞ˚"}]},
{subj:"maths",topic:"algebra — simultaneous equations, quadratics & factorising",note:"quadratics are where manipulation rules get real — visual method walkthroughs first",steps:[{t:"0:00",h:"three types of factorising — 3 min",b:"write the three types: (1) common factor: 6x²+9x = 3x(2x+3). (2) difference of two squares: x²-25 = (x+5)(x-5). (3) double bracket: x²+5x+6 = (x+2)(x+3). which do you recognise? which looks new?"},{t:"0:03",h:"worked examples — 10 min",b:"search youtube: 'corbettmaths factorising quadratics' and 'corbettmaths simultaneous equations elimination'. pause after every example and redo it from scratch before the solution is revealed."},{t:"0:13",h:"difference of two squares — 3 min",b:"a²-b² = (a+b)(a-b). always. try: x²-16, 4x²-9, 25-x². they all look different but they're all this one rule. once you see the pattern it's easy marks."},{t:"0:16",h:"mcq + questions — 10 min",b:"savemyexams.com → igcse maths → quadratics. mcqs first (pattern recognition), then 2 structured questions. show all working — quadratic formula as backup method is fine."},{t:"0:26",h:"wrap up — 2 min",b:"write the factorising type that feels shakiest. that's your flag. done ✦"}]},
{subj:"physics",topic:"energy — forms, conservation, efficiency, work & power",note:"energy calculations are very doable — the tricky bit is efficiency wording in describe questions",steps:[{t:"0:00",h:"formula recall — 3 min",b:"write: efficiency = (useful output ÷ total input) × 100, work done = force × distance, power = work done ÷ time. blank ones = your focus."},{t:"0:03",h:"watch cognito — 10 min",b:"search youtube: 'cognito energy igcse physics' and 'cognito efficiency igcse'. efficiency comes up every year and the mark scheme wording is very specific."},{t:"0:13",h:"exam phrase drill — 5 min",b:"write these, cover and rewrite: 'energy is conserved — cannot be created or destroyed, only transferred', 'wasted energy is usually dissipated as heat to surroundings', 'a more efficient device transfers more energy usefully and wastes less'."},{t:"0:18",h:"calculation set — 8 min",b:"physicsandmathstutor.com → energy, work & power. do 3-4 calculations. if an efficiency question catches you, check you divided useful output by total input, not the other way around."},{t:"0:26",h:"one explain question — 2 min",b:"find a 'why is this device not 100% efficient' question. answer using the phrase from step 3. keyword is usually 'heat' or 'dissipated'. done ˖๋ ✦"}]},
{subj:"biology",topic:"plant nutrition — photosynthesis, limiting factors & minerals",note:"equation is easy — limiting factors graph wording is where marks get lost",steps:[{t:"0:00",h:"equation first — 2 min",b:"write from memory: 6CO₂ + 6H₂O → C₆H₁₂O₆ + 6O₂. if you can't, that's task one — this comes up every year."},{t:"0:02",h:"mcq cold start — 8 min",b:"savemyexams.com → igcse biology → plant nutrition. do the full mcq set. limiting factors questions are in here — you'll immediately see if the wording is tripping you up."},{t:"0:10",h:"watch cognito — 8 min",b:"search youtube: 'cognito photosynthesis igcse biology'. watch specifically for how they explain limiting factors — light, CO₂, temperature."},{t:"0:18",h:"limiting factor phrases — 5 min",b:"write these: 'light is the limiting factor because increasing CO₂ has no effect on rate', 'rate increases with temperature until enzymes denature at high temperatures'. these two come up every year."},{t:"0:23",h:"graph question — 5 min",b:"physicsandmathstutor.com → biology → plant nutrition. find a limiting factors graph question. write your answer, check mark scheme, circle every keyword hit and miss. done ˚"}]},
{subj:"past paper day",topic:"timed past paper — maths paper 2 style, no calculator, 30 min",note:"exam conditions. phone away.",steps:[{t:"0:00",h:"set up — 2 min",b:"get a maths igcse paper 2 (non-calculator) from pastpapers.papacambridge.com. separate screen or printed. pen and paper only. set 20-minute timer."},{t:"0:02",h:"timed attempt — 20 min",b:"work in silence. skip stuck questions and come back — exactly like the real exam. show all working even if unsure of the method. do not check anything."},{t:"0:22",h:"mark it — 5 min",b:"stop at 20 minutes. mark every question against the mark scheme. circle in red every question where you lost marks."},{t:"0:27",h:"diagnose — 3 min",b:"for every red circle write: 'lost marks because ___'. method? rule forgotten? manipulation step? this is your exact revision list for the next maths sessions. done ✦"}]},
{subj:"maths",topic:"algebra — functions, domain, range, inverse & composite",note:"functions feel abstract but become easy once you read notation as instructions",steps:[{t:"0:00",h:"notation translation — 3 min",b:"write these translations: f(x) = 'do this operation to x'. f(3) = 'put 3 in as x'. fg(x) = 'do g first, then f on the result'. f⁻¹(x) = 'reverse the function'. once you see notation as ordered instructions it unlocks."},{t:"0:03",h:"worked examples — 12 min",b:"search youtube: 'corbettmaths composite functions' and 'corbettmaths inverse functions'. pause after each example, cover the working, redo it yourself. functions clicked for most people after 3-4 worked examples."},{t:"0:15",h:"inverse function method — 4 min",b:"write this method: replace f(x) with y → swap x and y → rearrange for y. example: f(x)=2x+3 → y=2x+3 → x=2y+3 → y=(x-3)/2. so f⁻¹(x)=(x-3)/2. try one yourself now."},{t:"0:19",h:"mcq + questions — 9 min",b:"savemyexams.com → igcse maths → functions. mcqs first, then 1 composite and 1 inverse question. write every substitution step — don't skip steps, that's where errors creep in. done ✦"}]},
{subj:"physics",topic:"thermal physics — kinetic model, specific heat, latent heat & transfer",note:"calculation-friendly but 'explain using kinetic theory' needs specific phrases",steps:[{t:"0:00",h:"formula recall — 3 min",b:"write: Q = mcΔT (specific heat), Q = ml (latent heat). if blank, write them now — these are the two thermal calculation formulas."},{t:"0:03",h:"watch cognito — 10 min",b:"search youtube: 'cognito kinetic model igcse physics' and 'cognito specific heat latent heat igcse'. kinetic model is the tricky explain one; heat calculations are the doable ones."},{t:"0:13",h:"kinetic theory phrases — 5 min",b:"write these, cover, rewrite: 'particles in a gas move faster when temperature increases so pressure increases', 'evaporation occurs when faster-moving surface particles escape', 'when heated, particles vibrate more and take up more space — expansion'."},{t:"0:18",h:"calculation practice — 8 min",b:"physicsandmathstutor.com → thermal physics. do 3 Q=mcΔT calculations. then find one 'explain using kinetic theory' question and answer using the phrases from step 3."},{t:"0:26",h:"wrap up — 2 min",b:"write the kinetic theory phrase you found hardest to recall. that's your thermal flag. done ˚"}]},
{subj:"biology",topic:"human nutrition — diet, digestion & absorption",note:"enzyme names and their exact locations are the keyword gaps here",steps:[{t:"0:00",h:"mcq cold start — 8 min",b:"savemyexams.com → igcse biology → human nutrition. do the full mcq set cold. immediately shows which enzyme names and locations are slipping."},{t:"0:08",h:"enzyme location table — 5 min",b:"write from memory, then check: amylase → mouth + small intestine → starch to sugars. protease → stomach + small intestine → proteins to amino acids. lipase → small intestine → fats to fatty acids + glycerol. bile → emulsifies fats, made in liver, stored in gall bladder."},{t:"0:13",h:"watch cognito — 8 min",b:"search youtube: 'cognito digestion igcse biology'. watch specifically for absorption in the small intestine — villi structure and surface area. very common question."},{t:"0:21",h:"villi keyword drill — 4 min",b:"write these 4 points = full marks on any villi question: 'large surface area', 'one cell thick wall (short diffusion distance)', 'good blood supply maintains concentration gradient', 'microvilli increase surface area further'."},{t:"0:25",h:"past paper question — 3 min",b:"find a digestion past paper question. write your answer, check mark scheme, circle keyword hits and misses. done ˚ʚ♡ɞ˚"}]},

{subj:"maths",topic:"coordinate geometry & graphs — gradient, midpoint & curves",note:"visual topic — drawing and labelling graphs is half the battle",steps:[{t:"0:00",h:"formula recall — 3 min",b:"write: gradient = (y₂−y₁)÷(x₂−x₁), midpoint = ((x₁+x₂)/2, (y₁+y₂)/2), y=mx+c where m=gradient, c=y-intercept. these three cover the whole topic."},{t:"0:03",h:"worked examples — 10 min",b:"search youtube: 'corbettmaths equation of a line' and 'corbettmaths midpoint and gradient'. pause and redo each example yourself. for graphs, actually sketch them on paper — your brain retains visual patterns."},{t:"0:13",h:"curve shapes — 4 min",b:"draw and label from memory: quadratic → u or n shape. reciprocal → two curves in opposite corners. cubic → s-shape. exponential → rapid growth. 'sketch the graph' questions = knowing the shape is literally half the answer."},{t:"0:17",h:"mcq + questions — 9 min",b:"savemyexams.com → igcse maths → coordinate geometry. mcqs first, then 1 gradient/line question and 1 graph sketching question. label key points like axis crossings."},{t:"0:26",h:"wrap up — 2 min",b:"write the curve shape you found hardest to draw from memory. done ✦"}]},
{subj:"physics",topic:"waves & sound — properties, transverse vs longitudinal & echo",note:"diagrams are specifically hard for you in physics — let's tackle that directly today",steps:[{t:"0:00",h:"diagram attempt — 4 min",b:"draw from memory: transverse wave (label crest, trough, wavelength, amplitude) and longitudinal wave (label compression, rarefaction, wavelength). don't look — draw what you think. this shows the exact gap."},{t:"0:04",h:"watch cognito — 10 min",b:"search youtube: 'cognito waves igcse physics'. pause on every diagram and redraw it yourself on paper immediately — don't let diagrams just wash over you."},{t:"0:14",h:"wave diagram redraw — 4 min",b:"redraw both waves correctly. write the key distinction: transverse = displacement perpendicular to direction of travel (rope wave, light). longitudinal = displacement parallel to direction (sound, slinky). this distinction is asked every year."},{t:"0:18",h:"exam phrase + formula drill — 4 min",b:"write: 'frequency = number of complete waves per second (hz)', 'wave speed = frequency × wavelength (v=fλ)', 'echo = reflection of sound wave from a surface'. these three are the most tested."},{t:"0:22",h:"past paper questions — 6 min",b:"physicsandmathstutor.com → waves. do 1 diagram question and 1 calculation. for the diagram: does your label match exactly what they asked? done ˖๋ ✦"}]},
{subj:"biology",topic:"respiration — aerobic & anaerobic, gas exchange in humans & plants",note:"you know the concept — the equations and alveoli keywords are the gaps",steps:[{t:"0:00",h:"equation recall — 3 min",b:"write from memory: aerobic: glucose + oxygen → carbon dioxide + water. anaerobic (human): glucose → lactic acid. anaerobic (yeast): glucose → ethanol + carbon dioxide. if you can write all three you're ahead."},{t:"0:03",h:"mcq first — 8 min",b:"savemyexams.com → igcse biology → respiration + gas exchange. do both mcq sets. fastest route to finding which specific keywords are slipping."},{t:"0:11",h:"watch cognito — 8 min",b:"search youtube: 'cognito gas exchange igcse biology'. watch specifically for alveoli structure and features — asked almost every year."},{t:"0:19",h:"alveoli keyword phrases — 5 min",b:"write these 4 points = full marks: 'large surface area', 'thin walls — one cell thick', 'moist surface — gases dissolve', 'good blood supply maintains concentration gradient'. cover and rewrite."},{t:"0:24",h:"past paper question — 4 min",b:"find an alveoli or anaerobic respiration question. write your answer using the keywords. check mark scheme — circle every phrase you hit and missed. done ˚ʚ♡ɞ˚"}]},
{subj:"maths",topic:"geometry — angles, polygons & circle theorems",note:"circle theorems specifically stress you — visual reference cards are your best friend here",steps:[{t:"0:00",h:"angle facts warmup — 3 min",b:"write from memory: angles in triangle = 180°, quadrilateral = 360°, exterior angle of regular polygon = 360°÷n. these are the easy ones — nail them first."},{t:"0:03",h:"circle theorems visual reference — 8 min",b:"search youtube: 'corbettmaths circle theorems'. as each theorem appears, pause and draw it yourself with the rule written underneath. you're building a visual reference card during the video."},{t:"0:11",h:"all 6 theorems written out — 5 min",b:"write with tiny sketches: (1) angle at centre = 2× angle at circumference. (2) angles in same segment equal. (3) angle in semicircle = 90°. (4) opposite angles in cyclic quad add to 180°. (5) tangent meets radius at 90°. (6) tangents from external point equal length."},{t:"0:16",h:"mcq drill — 8 min",b:"savemyexams.com → igcse maths → circle theorems. for each question, name the theorem you're using before picking the answer — this is the pattern recognition you need."},{t:"0:24",h:"one past paper question — 4 min",b:"mathsgenie.co.uk → circle theorems. write the theorem name in full for each step — 'angle at centre is twice angle at circumference' gets the method mark even if the number is wrong. done ✦"}]},
{subj:"past paper day",topic:"timed past paper — biology paper 4 extended style, 30 min",note:"exam conditions. clear desk, phone away.",steps:[{t:"0:00",h:"set up — 2 min",b:"get biology igcse paper 4 from pastpapers.papacambridge.com. you're extended — answer all parts including supplement content. set 20-minute timer."},{t:"0:02",h:"timed attempt — 20 min",b:"work in silence. if you blank on a keyword, write what you know — partial credit is real. if question says 'explain' write cause + effect. 'state' = one fact only."},{t:"0:22",h:"mark it — 5 min",b:"stop at 20 minutes. circle every question where you lost marks — pay special attention to keyword losses (knew the concept, wrong word)."},{t:"0:27",h:"keyword gap list — 3 min",b:"for every circle, write the keyword the mark scheme used that you didn't. this is your personal biology keyword list — these exact words keep costing you marks. done ✦"}]},
{subj:"physics",topic:"light & em spectrum — reflection, refraction & total internal reflection",note:"this whole topic is diagrams — going slow and visual today",steps:[{t:"0:00",h:"draw first — 4 min",b:"without looking: draw a ray hitting a flat mirror and reflecting (label normal, angle of incidence, angle of reflection). then draw a ray passing from glass into air. draw from memory first — wrong is fine, it shows the gap."},{t:"0:04",h:"watch cognito — 10 min",b:"search youtube: 'cognito light igcse physics' and 'cognito total internal reflection igcse'. pause on every diagram and redraw it yourself immediately, labelling everything they label."},{t:"0:14",h:"diagram rules written out — 5 min",b:"write with sketches: reflection → angle of incidence = angle of reflection, both from normal. refraction → bends towards normal entering denser medium. total internal reflection → angle of incidence exceeds critical angle inside denser medium (e.g. optical fibre)."},{t:"0:19",h:"em spectrum order — 3 min",b:"write in order of increasing frequency: radio, microwave, infrared, visible, ultraviolet, x-ray, gamma. mnemonic: 'raving mad iguanas vomit unusually xenophobic germs'. all travel at speed of light."},{t:"0:22",h:"past paper diagram question — 6 min",b:"physicsandmathstutor.com → light. find a ray diagram question. follow your rules from step 3. check mark scheme — is your normal dashed? arrows on rays? these details lose marks. done ˖๋ ✦"}]},
{subj:"biology",topic:"transport in plants & humans — xylem, phloem, heart & blood vessels",note:"vessel names, valve names and heart structure keywords are the gaps",steps:[{t:"0:00",h:"mcq cold start — 8 min",b:"savemyexams.com → igcse biology → transport in plants + transport in humans. do both mcq sets. faster than any video for finding which vessel names and valve names you're blanking on."},{t:"0:08",h:"watch cognito — 8 min",b:"search youtube: 'cognito heart igcse biology'. watch specifically for the heart structure diagram — chambers, valves, vessels. pause on the diagram and label your own version while watching."},{t:"0:16",h:"heart keywords — 5 min",b:"write without looking: left ventricle → aorta → body. right ventricle → pulmonary artery → lungs. vena cava → right atrium. pulmonary vein → left atrium. valves: atrioventricular (between chambers), semilunar (at exits). these names are the mark scheme keywords."},{t:"0:21",h:"plant transport — 5 min",b:"write: xylem → water + minerals, roots to leaves, dead cells, transpiration pull. phloem → dissolved sugars, leaves to rest of plant, living cells, translocation. examiner wants direction AND substance transported."},{t:"0:26",h:"past paper question — 2 min",b:"find a heart structure or transpiration question. write answer, check mark scheme, circle keyword hits and misses. done ˚"}]},
{subj:"maths",topic:"mensuration & trigonometry — areas, volumes, sine & cosine rule",note:"trig is the tricky bit — worked examples with clear method steps are essential",steps:[{t:"0:00",h:"formula check — 3 min",b:"write: area of triangle = ½bh, circle = πr², cylinder = πr²h, cone = ⅓πr²h. then: sine rule = a/sinA = b/sinB, cosine rule = a² = b²+c²-2bc cosA. blank ones = focus today."},{t:"0:03",h:"decision tree — 3 min",b:"write: right angle? → soh cah toa. no right angle + 2 sides + included angle → cosine rule. no right angle + 2 angles + 1 side → sine rule. this is the decision most people miss under exam pressure."},{t:"0:06",h:"worked examples — 10 min",b:"search youtube: 'corbettmaths sine rule' and 'corbettmaths cosine rule'. pause after each example and redo from scratch before watching the solution."},{t:"0:16",h:"mcq + practice — 10 min",b:"savemyexams.com → igcse maths → trigonometry. mcqs first (which rule?), then 2 calculation questions. show the full formula substitution — method marks live there."},{t:"0:26",h:"wrap up — 2 min",b:"write the decision rule you'd most likely forget: right angle → soh cah toa. no right angle → sine or cosine. done ✦"}]},
{subj:"physics",topic:"electricity — current, voltage, resistance, ohm's law & circuits",note:"electricity feels hard but once the rules click it's very formulaic — building the foundation today",steps:[{t:"0:00",h:"formula foundation — 4 min",b:"write: V=IR (ohm's law), P=IV (power), E=IVt (energy). series: current same everywhere, voltages add. parallel: voltage same everywhere, currents add. write these rules before anything else."},{t:"0:04",h:"watch cognito — 12 min",b:"search youtube: 'cognito electric circuits igcse physics'. this is your most challenging physics topic so more input time today. pause and redraw every circuit diagram they show."},{t:"0:16",h:"circuit diagram symbols — 4 min",b:"write each symbol: battery → long + short line. resistor → rectangle. bulb → circle with cross. ammeter → circle with A (in series). voltmeter → circle with V (in parallel). draw each — wrong symbols lose easy marks."},{t:"0:20",h:"calculation practice — 8 min",b:"physicsandmathstutor.com → electricity. do 3 ohm's law/circuit calculations. write formula first, then substitute, then solve. if a series/parallel question catches you, re-read the rules from step 1."},{t:"0:28",h:"wrap up — 2 min",b:"write the one circuit rule (series or parallel) you keep getting mixed up. that's your electricity flag. done ˖๋ ✦"}]},

{subj:"biology",topic:"diseases & immunity, excretion — kidneys & urea",note:"immune cell names and kidney process steps are the keyword gaps",steps:[{t:"0:00",h:"mcq cold start — 8 min",b:"savemyexams.com → igcse biology → diseases & immunity + excretion. do both mcq sets. immunity and kidney questions are keyword-dense — mcqs immediately show which terms are slipping."},{t:"0:08",h:"immunity keywords in context — 6 min",b:"find a past paper immunity question on physicsandmathstutor.com. read mark scheme. underline: 'antibodies', 'antigens', 'lymphocytes', 'phagocytosis', 'memory cells'. seeing them in sentences = your strongest memorisation method."},{t:"0:14",h:"watch cognito — 8 min",b:"search youtube: 'cognito kidney igcse biology'. watch for ultrafiltration, selective reabsorption, urea formation. kidney questions ask for the process in order — that order matters."},{t:"0:22",h:"kidney sequence — 4 min",b:"write in order: blood enters kidney → glomerulus (high pressure) → ultrafiltration into bowman's capsule → useful substances reabsorbed (glucose, water, ions) → urea remains → urine to ureter → bladder. that sequence is the exam answer."},{t:"0:26",h:"past paper question — 2 min",b:"find a kidney or immunity question. write using keywords above. check mark scheme, circle misses. done ˚ʚ♡ɞ˚"}]},
{subj:"maths",topic:"transformations, vectors, matrices, statistics & probability",note:"big combined day — prioritising vectors and probability as extended content",steps:[{t:"0:00",h:"confidence check — 2 min",b:"rate 1-3: transformations, vectors, matrices, statistics, probability. lowest scores = where to spend today's time."},{t:"0:02",h:"vector worked examples — 8 min",b:"search youtube: 'corbettmaths vectors igcse'. column notation: (3 above 2) = 3 right, 2 up. adding vectors = add components. magnitude = √(x²+y²). copy the notation exactly — vectors are visual."},{t:"0:10",h:"probability tree diagrams — 6 min",b:"search youtube: 'corbettmaths tree diagrams'. rule: multiply along branches (and = ×), add between branches (or = +). draw a coin-flip-twice tree and work through it. this pattern applies to every tree diagram question."},{t:"0:16",h:"mcq across topics — 10 min",b:"savemyexams.com → statistics & probability + transformations. for transformations: always state type + centre + scale factor/angle/line. three things = full marks."},{t:"0:26",h:"wrap up — 2 min",b:"write the one topic from today that needs more time — flag it for past paper review sessions. done ✦"}]},
{subj:"biology",topic:"coordination, hormones, reproduction, inheritance & variation",note:"mcqs are the engine today — lots of keyword-specific content across multiple topics",steps:[{t:"0:00",h:"mcq cold start — 10 min",b:"savemyexams.com → igcse biology → coordination + reproduction + inheritance. do all three mcq sets back to back. this is the most efficient use of today across multiple keyword-heavy topics."},{t:"0:10",h:"nervous vs hormonal — 4 min",b:"write the comparison: nervous → fast, short-lived, electrical, nerves. hormonal → slow, long-lasting, chemical, blood. then reflex arc: stimulus → receptor → coordinator → effector → response. this sequence = full marks on coordination questions."},{t:"0:14",h:"genetics keywords in context — 6 min",b:"find an inheritance past paper question on physicsandmathstutor.com. read mark scheme. underline: 'dominant', 'recessive', 'homozygous', 'heterozygous', 'genotype', 'phenotype', 'allele'. draw the punnett square if there is one."},{t:"0:20",h:"watch cognito — 8 min",b:"search youtube: 'cognito inheritance igcse biology'. watch for punnett squares and phenotype ratio explanations. you know how genetics works — this fills in specific keyword names and diagram conventions."},{t:"0:28",h:"wrap up — 2 min",b:"write 3 keywords from today you'd most likely blank on in an exam. those are your anchor words. done ˚"}]},
{subj:"past paper day",topic:"timed past paper — physics paper 3 core + paper 6 biology, 30 min each",note:"two sessions today. 30 min physics then 30 min paper 6.",steps:[{t:"0:00",h:"physics paper — set up — 2 min",b:"get physics igcse paper 3 (core) from pastpapers.papacambridge.com. you're core tier — don't panic about extended content in older papers. set 20-minute timer."},{t:"0:02",h:"physics timed attempt — 20 min",b:"work in silence. for every 'describe' or 'explain' question, write the phrase you memorised — not just what sounds right. attempt everything — partial marks are real."},{t:"0:22",h:"mark physics — 5 min",b:"mark against scheme. circle keyword losses specifically — these are different from method errors. keyword losses = phrases you drilled but didn't use under pressure."},{t:"0:27",h:"paper 6 — break then start — 3 min",b:"short break. get biology paper 6 from pastpapers.papacambridge.com. remember the format: independent variable, dependent variable, control variables, method, results table, graph, evaluation. set 20 min timer and work through. mark after. done ✦"}]},

var RM={7:"rest or catch-up. if you missed a session, now's the moment. if you're on track, genuinely rest — your brain consolidates while you sleep, so this day counts too ˖๋ ✦",16:"rest or catch-up. you're halfway through the plan. take this seriously — rest is part of how memory works. go outside, do something you enjoy ˚",26:"rest or catch-up. you are so close now. take this one completely easy ˚ʚ♡ɞ˚",31:"your exam is today. you have done the work. eat something good, get there early, read every question fully before writing a single word. you've genuinely got this ✦ ♡"};
var BD=[{icon:"⭑",name:"first step",check:function(d){return d.has(0);}},{icon:"♡",name:"3 in a row",check:function(d,s){return s>=3;}},{icon:"𖥔",name:"one week",check:function(d){return d.size>=7;}},{icon:"✦",name:"halfway",check:function(d){return d.size>=16;}},{icon:"⊹",name:"21 days",check:function(d){return d.size>=21;}},{icon:"˚ʚ♡ɞ˚",name:"all done",check:function(d){return d.size>=33;}}];
var done=(function(){try{return new Set(JSON.parse(localStorage.getItem('igcse_v7')||'[]'));}catch(e){return new Set();}})();
function sv(){try{localStorage.setItem('igcse_v7',JSON.stringify(Array.from(done)));}catch(e){}}
function cs(){var s=0;for(var i=DAYS.length-1;i>=0;i--){if(done.has(i))s++;else break;}return s;}
function us(){var n=done.size,streak=cs(),left=32-n,pct=Math.round(n/33*100);document.getElementById('st-done').textContent=n;document.getElementById('st-streak').textContent=streak;document.getElementById('st-left').textContent=left;document.getElementById('pbar').style.width=pct+'%';var msgs=["let's go ˚","just getting started ˖๋","making moves ✦","quarter way there ⭑","keep going ♡","halfway!! ˚ʚ♡ɞ˚","over halfway, you're amazing ✦","almost there 𖥔","so close ⊹","done. you actually did it ˚ʚ♡ɞ˚"];document.getElementById('plabel').textContent=pct+'% — '+msgs[Math.min(Math.floor(pct/11),9)];var sb=document.getElementById('streak-banner');if(streak>=3){sb.style.display='block';sb.textContent=streak+' day streak 𖥔 you\'re on a roll — don\'t stop now ✦';}else sb.style.display='none';rb(streak);}
function rb(streak){var row=document.getElementById('badges-row');row.innerHTML='';BD.forEach(function(b){var earned=b.check(done,streak);var el=document.createElement('div');el.className='badge'+(earned?' earned':'');el.innerHTML='<span class="badge-icon">'+b.icon+'</span><span class="badge-name">'+b.name+'</span>';row.appendChild(el);});}
var oi=-1;
function cp(){oi=-1;document.getElementById('panel-slot').innerHTML='';bg();}
function sd(i){if(oi===i){cp();return;}oi=i;var day=DAYS[i],st=SS[day.subj],isRest=day.subj==='rest ˊˎ-';var html='<div class="panel" style="background:'+st.bg+';border-color:'+st.border+'">';html+='<div class="pan-hdr"><div class="pan-title" style="color:'+st.text+'">'+DC[i%DC.length]+' day '+(i+1)+' — '+day.subj+'</div><button class="pan-close" onclick="cp()">close ×</button></div>';html+='<div class="pan-date" style="color:'+st.dot+'">'+DATES[i]+'</div>';if(day.note&&!isRest)html+='<div class="pan-note">'+day.note+'</div>';html+='<div class="pan-topic" style="color:'+st.text+'">'+day.topic+'</div>';if(isRest){html+='<div class="step"><div class="step-b">'+(RM[i]||"rest or catch-up. take it easy today ˚")+'</div></div>';}else if(day.steps){html+='<div class="steps">';day.steps.forEach(function(s){html+='<div class="step"><div class="step-h" style="color:'+st.text+'">'+s.t+'&nbsp; '+s.h+'</div><div class="step-b">'+s.b+'</div></div>';});html+='</div>';}html+='<div class="pan-btns"><button class="pbtn'+(done.has(i)?' active':'')+'" onclick="td('+i+')">'+(done.has(i)?'✓ done!':'mark as done')+'</button></div></div>';var ps=document.getElementById('panel-slot');ps.innerHTML=html;ps.scrollIntoView({behavior:'smooth',block:'nearest'});bg();}
function td(i){if(done.has(i))done.delete(i);else done.add(i);sv();us();bg();if(oi===i)sd(i);}
function bg(){var grid=document.getElementById('cal-grid');grid.innerHTML='';var now=new Date();DAYS.forEach(function(day,i){var st=SS[day.subj];var d=new Date(2026,2,28);d.setDate(28+i);var isToday=d.toDateString()===now.toDateString();var isPP=day.subj==='past paper day';var card=document.createElement('div');card.className='dc'+(done.has(i)?' done':'')+(oi===i?' open':'');card.style.borderColor=oi===i?st.dot:(done.has(i)?'var(--s4)':st.dot+'44');if(oi===i)card.style.background=st.bg;card.innerHTML='<div class="dnum" style="color:'+st.text+'">'+(isToday?'<span class="tpip"></span>':'')+'day '+(i+1)+(done.has(i)?' ✓':'')+'</div><div class="ddate" style="color:'+st.dot+'">'+DATES[i]+'</div><div class="dsubj" style="color:'+st.text+'">'+day.subj+'</div><div class="dtopic" style="color:'+st.text+'">'+day.topic.substring(0,38)+(day.topic.length>38?'…':'')+'</div>'+(isPP?'<div class="ppb">timed ⏱</div>':'')+'<div class="ddeco">'+DC[i%DC.length]+'</div>';card.addEventListener('click',function(){sd(i);});grid.appendChild(card);});}
bg();us();
</script>
